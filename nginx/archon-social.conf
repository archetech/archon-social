# archon.social nginx configuration
#
# Architecture:
#   - nginx serves the client SPA (Vite build output) from /home/flaxscrip/archon-social/client/build
#   - nginx proxies API / OAuth / .well-known / directory routes to the Herald server on 127.0.0.1:4230
#
# Paths and ports to verify before deploying:
#   - $CLIENT_ROOT        — absolute path to client/build on this host
#   - $HERALD_PORT (4230) — must match ARCHON_HERALD_PORT in server/.env
#
# The VITE_API_URL used at build time should be set to '/api' (relative) so the
# React client hits nginx, which routes to the Herald server. See client/.env.production.

# HTTP → HTTPS redirect
server {
    if ($host = archon.social) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name archon.social;

    location / {
        return 301 https://$server_name$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name archon.social;

    ssl_certificate     /etc/letsencrypt/live/archon.social/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/archon.social/privkey.pem;   # managed by Certbot
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Path to the Vite build output. Update if you check the repo out elsewhere.
    root /home/flaxscrip/archon-social/client/build;
    index index.html;

    # Upload cap high enough for avatar images etc.
    client_max_body_size 8m;

    # -----------------------------------------------------------------------
    # Herald backend — proxied paths
    # -----------------------------------------------------------------------

    # Shared proxy settings
    set $herald http://127.0.0.1:4230;

    # REST API
    location /api/ {
        proxy_pass $herald;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth 2.0 / OIDC endpoints
    location /oauth/ {
        proxy_pass $herald;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Machine-readable member directory
    location = /directory.json {
        proxy_pass $herald;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OIDC discovery
    location = /.well-known/openid-configuration {
        proxy_pass $herald;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OIDC JWKS
    location = /.well-known/jwks.json {
        proxy_pass $herald;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebFinger
    location = /.well-known/webfinger {
        proxy_pass $herald;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public name listings: /.well-known/names and /.well-known/names/:name
    location /.well-known/names {
        proxy_pass $herald;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Lightning Address (LUD-16): /.well-known/lnurlp/:name
    location /.well-known/lnurlp {
        proxy_pass $herald;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Static files served directly by nginx
    # -----------------------------------------------------------------------

    # did:web:archon.social DID document (static, not served by Herald)
    location = /.well-known/did.json {
        alias /var/www/archon.social/.well-known/did.json;
        default_type application/did+json;
    }

    # AI agent discovery files — served from the client build directory
    # No special location needed; the SPA fallback below handles them.
    # llms.txt, llms-full.txt, agents.html, robots.txt all live in client/build/

    # Long cache for versioned Vite assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for any unmatched route so react-router works.
    # This is intentionally at the end so all proxied and static-file locations
    # above win first.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
